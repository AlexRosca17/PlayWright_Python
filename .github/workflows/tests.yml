name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag-ul testelor de rulat'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - Regression
          - Smoke

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r ATF/requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run tests
        run: |
          cd ATF
          if [ "${{ github.event.inputs.tag }}" = "all" ] || [ -z "${{ github.event.inputs.tag }}" ]; then
            pytest tests/ -v --alluredir=reports/allure
          else
            pytest tests/ -v --alluredir=reports/allure -m "${{ github.event.inputs.tag }}"
          fi

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: ATF/reports/allure

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs
          path: ATF/test_run.log
